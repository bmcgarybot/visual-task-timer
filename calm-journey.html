<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calm Journey — Guided Imagery for Kids</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Avenir','Segoe UI',sans-serif; }
body { color:#eee; display:flex; flex-direction:column; align-items:center; justify-content:center; touch-action:manipulation; -webkit-user-select:none; user-select:none; }

/* Dynamic background */
body { background:#0a1628; transition:background 3s ease; }
body.ocean { background:linear-gradient(180deg,#0a1628 0%,#0d3b66 40%,#1a6b8a 100%); }
body.forest { background:linear-gradient(180deg,#0a1a0a 0%,#1a3a1a 40%,#2d5a27 100%); }
body.space { background:linear-gradient(180deg,#0a0a1a 0%,#1a1a3d 40%,#2d1a4e 100%); }
body.clouds { background:linear-gradient(180deg,#2d3a5c 0%,#5a7bb5 40%,#8ab4d6 100%); }

/* --- START SCREEN --- */
#startScreen { text-align:center; padding:20px; z-index:10; }
#startScreen h1 { font-size:2.2em; margin-bottom:6px; }
#startScreen p { color:#aaa; font-size:1em; margin-bottom:20px; }

.env-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:300px; margin:0 auto 20px; }
.env-btn { padding:20px 10px; border:3px solid rgba(255,255,255,0.15); border-radius:16px; background:rgba(255,255,255,0.05); cursor:pointer; text-align:center; transition:all 0.2s; }
.env-btn:active { transform:scale(0.95); }
.env-btn.selected { border-color:#7ec8e3; background:rgba(126,200,227,0.15); }
.env-emoji { font-size:2.2em; display:block; margin-bottom:6px; }
.env-name { font-size:0.9em; font-weight:600; }

.dur-btns { display:flex; gap:10px; justify-content:center; margin-top:16px; }
.dur-btn { padding:12px 20px; border:none; border-radius:14px; font-size:1em; font-weight:600; cursor:pointer; transition:all 0.15s; }
.dur-btn:active { transform:scale(0.95); }
#btnMini { background:linear-gradient(135deg,#7ec8e3,#5fa8d3); color:#fff; }
#btnStandard { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
#btnSleep { background:linear-gradient(135deg,#2d3a5c,#4a5a8a); color:#fff; }

/* --- JOURNEY SCREEN --- */
#journeyScreen { display:none; width:100%; height:100%; position:relative; }

/* Floating particles */
.particle { position:absolute; border-radius:50%; opacity:0; animation:float-particle linear infinite; pointer-events:none; }
@keyframes float-particle {
  0% { opacity:0; transform:translateY(100vh) scale(0); }
  10% { opacity:0.6; }
  90% { opacity:0.6; }
  100% { opacity:0; transform:translateY(-20vh) scale(1); }
}

/* Central breathing orb */
#breathOrbWrap { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; }
#mainOrb { width:140px; height:140px; border-radius:50%; transition:transform 2s ease-in-out, box-shadow 2s ease-in-out; }
#mainOrb.inhale { transform:scale(1.6); }
#mainOrb.exhale { transform:scale(1); }
.orb-ocean { background:radial-gradient(circle,#7ec8e3,#0d3b66); box-shadow:0 0 60px rgba(126,200,227,0.4); }
.orb-ocean.inhale { box-shadow:0 0 100px rgba(126,200,227,0.6); }
.orb-forest { background:radial-gradient(circle,#7ed87e,#2d5a27); box-shadow:0 0 60px rgba(126,216,126,0.4); }
.orb-forest.inhale { box-shadow:0 0 100px rgba(126,216,126,0.6); }
.orb-space { background:radial-gradient(circle,#c490f0,#2d1a4e); box-shadow:0 0 60px rgba(196,144,240,0.4); }
.orb-space.inhale { box-shadow:0 0 100px rgba(196,144,240,0.6); }
.orb-clouds { background:radial-gradient(circle,#fff,#8ab4d6); box-shadow:0 0 60px rgba(255,255,255,0.4); }
.orb-clouds.inhale { box-shadow:0 0 100px rgba(255,255,255,0.6); }

/* Breath label */
#breathGuide { position:absolute; top:calc(50% + 100px); left:50%; transform:translateX(-50%); font-size:1.4em; font-weight:600; z-index:5; text-align:center; opacity:0.9; transition:opacity 0.5s; }

/* Story text */
#storyText { position:absolute; bottom:120px; left:20px; right:20px; font-size:1.15em; line-height:1.6; text-align:center; z-index:5; min-height:3em; transition:opacity 1s; }

/* Progress */
#journeyProgress { position:absolute; bottom:70px; left:20px; right:20px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; z-index:5; }
#journeyBar { height:100%; background:rgba(255,255,255,0.4); border-radius:2px; transition:width 0.5s; width:0%; }
#journeyTime { position:absolute; bottom:78px; right:20px; font-size:0.75em; color:rgba(255,255,255,0.5); z-index:5; }

/* Controls */
#journeyControls { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:12px; z-index:5; }
#journeyControls button { padding:10px 24px; border:none; border-radius:12px; font-size:0.9em; font-weight:600; cursor:pointer; background:rgba(255,255,255,0.15); color:#fff; backdrop-filter:blur(10px); }
#journeyControls button:active { background:rgba(255,255,255,0.25); }

/* --- DONE SCREEN --- */
#doneScreen { display:none; text-align:center; padding:20px; z-index:10; }
#doneScreen h1 { font-size:2em; margin-bottom:12px; }
#doneScreen .glow { font-size:3em; margin:16px 0; }
#doneScreen p { color:#aaa; margin-bottom:20px; }
#btnHome { padding:14px 40px; border:none; border-radius:16px; background:linear-gradient(135deg,#7ec8e3,#5fa8d3); color:#fff; font-size:1.1em; font-weight:700; cursor:pointer; }

.hidden { display:none !important; }
</style>
</head>
<body>

<!-- START -->
<div id="startScreen">
  <h1>🌙 Calm Journey</h1>
  <p>Close your eyes and float away</p>

  <div class="env-grid">
    <div class="env-btn selected" data-env="ocean" onclick="selectEnv(this)">
      <span class="env-emoji">🌊</span>
      <span class="env-name">Ocean</span>
    </div>
    <div class="env-btn" data-env="forest" onclick="selectEnv(this)">
      <span class="env-emoji">🌲</span>
      <span class="env-name">Forest</span>
    </div>
    <div class="env-btn" data-env="space" onclick="selectEnv(this)">
      <span class="env-emoji">🚀</span>
      <span class="env-name">Space</span>
    </div>
    <div class="env-btn" data-env="clouds" onclick="selectEnv(this)">
      <span class="env-emoji">☁️</span>
      <span class="env-name">Clouds</span>
    </div>
  </div>

  <div class="dur-btns">
    <button class="dur-btn" id="btnMini" onclick="startJourney('mini')">Mini<br><span style="font-size:0.7em;font-weight:400">3 min</span></button>
    <button class="dur-btn" id="btnStandard" onclick="startJourney('standard')">Standard<br><span style="font-size:0.7em;font-weight:400">8 min</span></button>
    <button class="dur-btn" id="btnSleep" onclick="startJourney('sleep')">Sleep<br><span style="font-size:0.7em;font-weight:400">15 min</span></button>
  </div>
</div>

<!-- JOURNEY -->
<div id="journeyScreen">
  <div id="breathOrbWrap">
    <div id="mainOrb" class="orb-ocean"></div>
  </div>
  <div id="breathGuide">Breathe in...</div>
  <div id="storyText"></div>
  <div id="journeyProgress"><div id="journeyBar"></div></div>
  <div id="journeyTime"></div>
  <div id="journeyControls">
    <button onclick="togglePause()">⏸ Pause</button>
    <button onclick="endJourney()">✕ End</button>
  </div>
</div>

<!-- DONE -->
<div id="doneScreen">
  <h1>You did it 💜</h1>
  <div class="glow">✨</div>
  <p id="doneMsg">Your calm journey is complete</p>
  <button id="btnHome" onclick="goHome()">Home</button>
</div>

<script>
// --- STORIES ---
const STORIES = {
  ocean: {
    intro: [
      "Imagine you're lying on a warm, soft beach...",
      "The sand is perfectly warm beneath you...",
      "You can hear gentle waves rolling in..."
    ],
    middle: [
      "A friendly dolphin swims nearby, watching over you...",
      "The water is crystal clear and sparkles like diamonds...",
      "Tiny colorful fish swim past, saying hello...",
      "A gentle wave washes over your feet, cool and refreshing...",
      "The ocean breeze carries away all your worries...",
      "You feel yourself floating on the warm water...",
      "The rhythm of the waves matches your breathing...",
      "Everything is peaceful... everything is safe..."
    ],
    close: [
      "The waves gently carry you back to shore...",
      "You feel calm, warm, and completely safe...",
      "This peaceful feeling stays with you..."
    ]
  },
  forest: {
    intro: [
      "You're walking on a soft, mossy path through the trees...",
      "Sunlight filters through the green leaves above...",
      "The air smells fresh and clean..."
    ],
    middle: [
      "A friendly owl watches from a branch, blinking slowly...",
      "Soft butterflies land on flowers around you...",
      "You find a cozy spot under a big, safe tree...",
      "A gentle stream trickles nearby, making a soothing sound...",
      "The leaves whisper 'you are safe, you are loved'...",
      "A baby deer peeks at you from behind a bush...",
      "The forest wraps around you like a warm blanket...",
      "Every breath fills you with green, peaceful energy..."
    ],
    close: [
      "The forest path leads you to a sunny meadow...",
      "You carry the peace of the forest with you...",
      "You feel grounded, calm, and strong..."
    ]
  },
  space: {
    intro: [
      "You're floating gently through space in a cozy spaceship...",
      "Stars twinkle all around you like tiny night lights...",
      "Everything is quiet and peaceful up here..."
    ],
    middle: [
      "A friendly star winks at you as you float past...",
      "You pass a beautiful blue planet, calm and quiet...",
      "Soft stardust sparkles around your hands...",
      "The moon smiles down at you, warm and gentle...",
      "You're wrapped in a blanket of starlight...",
      "Nebula clouds swirl in purple and pink around you...",
      "Each star is a wish coming true just for you...",
      "In space, everything is weightless and free..."
    ],
    close: [
      "Your spaceship gently brings you home...",
      "The stars whisper 'we're always here for you'...",
      "You feel light, peaceful, and full of wonder..."
    ]
  },
  clouds: {
    intro: [
      "You're lying on the softest, fluffiest cloud...",
      "It holds you perfectly, like a cloud hammock...",
      "The sky is painted in soft pink and gold..."
    ],
    middle: [
      "Other clouds float by in funny shapes — a bunny, a dragon...",
      "A warm breeze rocks your cloud gently back and forth...",
      "You can see tiny houses below, peaceful and quiet...",
      "A rainbow appears just for you, bright and beautiful...",
      "The sun sends warm golden light across your face...",
      "Your cloud drifts slowly, carrying away your worries...",
      "Birds fly alongside you, singing a gentle song...",
      "Up here, there is nothing to do but be calm..."
    ],
    close: [
      "Your cloud slowly, gently drifts back down...",
      "You land softly in a field of flowers...",
      "You feel floaty, calm, and perfectly happy..."
    ]
  }
};

// --- PMR (Progressive Muscle Relaxation) inserts ---
const PMR = [
  "Make your hands into tight fists... squeeze... now let them be floppy like noodles...",
  "Scrunch your shoulders up to your ears... hold... now let them drop down, soft and relaxed...",
  "Press your toes into the ground... tight... now let them go all wiggly and loose...",
  "Squeeze your eyes shut really tight... hold... now let them rest, soft and easy...",
  "Take a big breath and puff up your tummy like a balloon... now let all the air out, slow and gentle..."
];

// --- STATE ---
let env = 'ocean';
let duration = 'standard'; // mini=3min, standard=8min, sleep=15min
let paused = false;
let journeyTimer = null;
let breathTimer = null;
let storyTimer = null;
let particleTimer = null;
let startTime = 0;
let totalMs = 0;
let elapsed = 0;
let audioCtx = null;
let storyQueue = [];
let storyIdx = 0;
let isSleep = false;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// --- ENV SELECTION ---
function selectEnv(el) {
  document.querySelectorAll('.env-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  env = el.dataset.env;
}

// --- START ---
function startJourney(dur) {
  initAudio();
  duration = dur;
  isSleep = dur === 'sleep';
  totalMs = dur === 'mini' ? 180000 : dur === 'standard' ? 480000 : 900000;
  elapsed = 0; paused = false; storyIdx = 0;

  // Build story queue
  const s = STORIES[env];
  storyQueue = [...s.intro];
  // For longer durations, add PMR + more middle
  const middlePool = [...s.middle];
  if (dur === 'standard' || dur === 'sleep') {
    storyQueue.push(PMR[0]);
    for (let i = 0; i < 4; i++) storyQueue.push(middlePool[i % middlePool.length]);
    storyQueue.push(PMR[1]);
    for (let i = 4; i < 8; i++) storyQueue.push(middlePool[i % middlePool.length]);
    storyQueue.push(PMR[2]);
  }
  if (dur === 'sleep') {
    storyQueue.push(PMR[3]);
    for (let i = 0; i < middlePool.length; i++) storyQueue.push(middlePool[i]);
    storyQueue.push(PMR[4]);
    for (let i = 0; i < 4; i++) storyQueue.push(middlePool[i]);
  }
  storyQueue.push(...s.close);

  // Setup visuals
  document.body.className = env;
  document.getElementById('mainOrb').className = `orb-${env}`;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('journeyScreen').style.display = 'block';

  createParticles();
  startBreathing();
  showNextStory();
  startClock();
}

// --- PARTICLES ---
function createParticles() {
  const container = document.getElementById('journeyScreen');
  // Clear old
  container.querySelectorAll('.particle').forEach(p => p.remove());

  const colors = {
    ocean:['#7ec8e3','#5fa8d3','#a8d8ea'],
    forest:['#7ed87e','#a8e6a8','#d4f0c4'],
    space:['#c490f0','#f0c4f0','#a0a0ff'],
    clouds:['#fff','#e8e8ff','#d4e8ff']
  };
  const cols = colors[env];

  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 10;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = cols[Math.floor(Math.random()*cols.length)];
    p.style.animationDuration = (8 + Math.random()*12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(p);
  }
}

// --- BREATHING ---
function startBreathing() {
  const orb = document.getElementById('mainOrb');
  const guide = document.getElementById('breathGuide');
  let phase = 0; // 0=in, 1=hold, 2=out, 3=rest

  const cycle = () => {
    if (paused) { breathTimer = setTimeout(cycle, 500); return; }
    if (phase === 0) {
      orb.classList.add('inhale'); orb.classList.remove('exhale');
      guide.textContent = 'Breathe in...';
      playBreathTone(300, 0.05);
    } else if (phase === 1) {
      guide.textContent = 'Hold...';
    } else if (phase === 2) {
      orb.classList.remove('inhale'); orb.classList.add('exhale');
      guide.textContent = 'Breathe out...';
      playBreathTone(200, 0.03);
    } else {
      guide.textContent = '';
    }

    const timing = isSleep ? [3000, 2000, 4000, 2000] : [2500, 1500, 3000, 1500];
    phase = (phase + 1) % 4;
    breathTimer = setTimeout(cycle, timing[(phase + 3) % 4]);
  };
  cycle();
}

function playBreathTone(freq, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.type = 'sine';
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.5);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
  osc.start(); osc.stop(audioCtx.currentTime + 2);
}

// --- STORY TEXT ---
function showNextStory() {
  if (storyIdx >= storyQueue.length) { storyIdx = 0; } // Loop for long sessions

  const textEl = document.getElementById('storyText');
  textEl.style.opacity = '0';

  setTimeout(() => {
    textEl.textContent = storyQueue[storyIdx];
    textEl.style.opacity = '1';
    storyIdx++;

    // Sleep mode: dim progressively
    if (isSleep && storyIdx > storyQueue.length * 0.7) {
      textEl.style.opacity = String(Math.max(0.3, 1 - (storyIdx / storyQueue.length)));
    }
  }, 500);

  const interval = duration === 'mini' ? 8000 : duration === 'standard' ? 12000 : 15000;
  storyTimer = setTimeout(() => {
    if (!paused) showNextStory();
    else {
      const check = () => { if (!paused) showNextStory(); else setTimeout(check, 500); };
      setTimeout(check, 500);
    }
  }, interval);
}

// --- CLOCK ---
function startClock() {
  startTime = Date.now();
  const tick = () => {
    if (!paused) {
      elapsed = Date.now() - startTime;
      const pct = Math.min(100, (elapsed / totalMs) * 100);
      document.getElementById('journeyBar').style.width = pct + '%';

      const remain = Math.max(0, Math.ceil((totalMs - elapsed) / 1000));
      const m = Math.floor(remain / 60);
      const s = remain % 60;
      document.getElementById('journeyTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;

      // Sleep mode: fade screen
      if (isSleep && pct > 70) {
        const fade = Math.max(0.3, 1 - ((pct - 70) / 30));
        document.getElementById('journeyScreen').style.opacity = fade;
      }

      if (elapsed >= totalMs) {
        finishJourney();
        return;
      }
    }
    journeyTimer = setTimeout(tick, 500);
  };
  tick();
}

// --- FINISH ---
function finishJourney() {
  cleanup();
  if (audioCtx) {
    [392, 523.25, 659.25].forEach((f,i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = f; osc.type = 'sine';
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime + i*0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.3 + 0.8);
      osc.start(audioCtx.currentTime + i*0.3);
      osc.stop(audioCtx.currentTime + i*0.3 + 0.8);
    });
  }
  if (navigator.vibrate) navigator.vibrate([80,40,80,40,160]);

  document.getElementById('journeyScreen').style.display = 'none';
  document.getElementById('journeyScreen').style.opacity = '1';

  const names = {mini:'Mini Journey',standard:'Calm Journey',sleep:'Sleep Journey'};
  const envNames = {ocean:'Ocean',forest:'Forest',space:'Space',clouds:'Clouds'};
  document.getElementById('doneMsg').textContent = `${names[duration]} through the ${envNames[env]} — complete!`;
  document.getElementById('doneScreen').style.display = 'block';
}

function cleanup() {
  clearTimeout(journeyTimer);
  clearTimeout(breathTimer);
  clearTimeout(storyTimer);
}

function togglePause() {
  paused = !paused;
  if (!paused) startTime = Date.now() - elapsed; // Adjust start time
}

function endJourney() {
  cleanup();
  document.getElementById('journeyScreen').style.display = 'none';
  document.getElementById('journeyScreen').style.opacity = '1';
  document.body.className = '';
  document.getElementById('startScreen').classList.remove('hidden');
}

function goHome() {
  document.getElementById('doneScreen').style.display = 'none';
  document.body.className = '';
  document.getElementById('startScreen').classList.remove('hidden');
}

document.addEventListener('touchstart', initAudio, {once:true});
document.addEventListener('click', initAudio, {once:true});
</script>
</body>
</html>
