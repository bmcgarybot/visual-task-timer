<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tap Along — EFT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;min-height:100dvh;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
.scr{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.scr.on{display:flex;animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
#home{background:linear-gradient(135deg,#4ecdc4,#44a08d);gap:10px;padding:24px;text-align:center}
.logo{font-size:clamp(32px,8vw,72px);font-weight:900;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.15)}
.logosub{font-size:clamp(12px,2.5vw,16px);color:rgba(255,255,255,.7);max-width:320px;line-height:1.4;margin-bottom:8px}
.mbtn{display:block;width:280px;margin:6px auto;padding:14px 20px;border:none;border-radius:16px;font-size:1.05em;font-weight:800;font-family:inherit;cursor:pointer;color:#fff;transition:all .15s;text-align:center}
.mbtn:active{transform:scale(.96)}
.m1{background:rgba(255,255,255,.18);backdrop-filter:blur(6px)}
.m2{background:rgba(255,255,255,.12);backdrop-filter:blur(6px)}
.m3{background:rgba(255,255,255,.08);backdrop-filter:blur(6px)}
.msub{font-size:.72em;font-weight:400;opacity:.75;display:block;margin-top:3px}

/* GUIDE SCREEN (reusable coaching overlay) */
#guide{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.gw{max-width:380px;padding:24px;text-align:center;width:100%}
.g-step{font-size:.7em;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:8px}
.g-emoji{font-size:4em;margin-bottom:12px}
.g-title{font-size:1.4em;font-weight:900;margin-bottom:6px;line-height:1.3}
.g-body{font-size:.92em;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:16px;white-space:pre-line}
.g-quote{background:rgba(78,205,196,.06);border:1px solid rgba(78,205,196,.15);border-radius:14px;padding:16px 20px;margin:12px 0 16px;font-size:1.1em;font-weight:700;color:#4ecdc4;line-height:1.5;font-style:italic}
.g-tap-zone{width:120px;height:120px;border-radius:50%;background:rgba(78,205,196,.1);border:4px solid rgba(78,205,196,.25);display:flex;align-items:center;justify-content:center;font-size:3em;margin:12px auto;cursor:pointer;transition:all .15s;animation:gz 1.5s ease-in-out infinite}
.g-tap-zone:active{transform:scale(1.1);background:rgba(78,205,196,.2)}
@keyframes gz{0%,100%{box-shadow:0 0 0 0 rgba(78,205,196,.2)}50%{box-shadow:0 0 0 18px rgba(78,205,196,0)}}
.g-count{font-size:2.2em;font-weight:900;color:#4ecdc4;margin:8px 0 2px}
.g-countlbl{font-size:.75em;color:rgba(255,255,255,.25)}
.g-prog{display:flex;gap:8px;justify-content:center;margin:12px 0}
.gp{width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,.08);transition:all .3s}
.gp.done{background:#4ecdc4}
.gp.cur{background:#4ecdc4;animation:gpp .8s ease-in-out infinite}
@keyframes gpp{0%,100%{opacity:1}50%{opacity:.4}}
.g-hint{font-size:.78em;color:rgba(255,255,255,.2);margin-top:8px}

/* SUDS */
#suds{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.sw{max-width:380px;padding:24px;text-align:center;width:100%}
.s-row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:12px}
.sb{width:50px;height:50px;border-radius:50%;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#fff;font-size:1.2em;font-weight:800;font-family:inherit;cursor:pointer;transition:all .2s}
.sb:active{transform:scale(.93)}
.sb.sel{border-color:#4ecdc4;background:rgba(78,205,196,.12);color:#4ecdc4;box-shadow:0 0 14px rgba(78,205,196,.25)}
.s-ends{display:flex;justify-content:space-between;max-width:300px;margin:0 auto 16px;font-size:.7em;color:rgba(255,255,255,.2)}

/* TAP SCREEN */
#tap{background:#1a1a2e}
.tap-top{position:absolute;top:0;left:0;right:0;padding:14px 20px;z-index:5;text-align:center}
.t-name{font-size:1.3em;font-weight:900}
.t-inst{font-size:.82em;color:rgba(255,255,255,.35);margin-top:2px}
.t-say{position:absolute;top:80px;left:16px;right:16px;text-align:center;z-index:5}
.t-say-lbl{font-size:.65em;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.t-say-txt{font-size:1em;font-weight:700;color:#4ecdc4;font-style:italic;line-height:1.3}
/* Body + points */
.bw{position:relative;width:250px;height:360px;margin:0 auto}
.bw svg{width:100%;height:100%}
.tp{position:absolute;width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;font-size:1.4em;cursor:pointer;transition:all .25s;z-index:6}
.tp.act{border-color:#4ecdc4;background:rgba(78,205,196,.15);box-shadow:0 0 20px rgba(78,205,196,.35);animation:tpp 1s ease-in-out infinite}
.tp.done{border-color:rgba(78,205,196,.1);background:rgba(78,205,196,.03);opacity:.25}
.tp.dim{opacity:.06}
.tp.next-up{border-color:rgba(78,205,196,.2);opacity:.6}
@keyframes tpp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.p-kc{top:230px;left:-5px}.p-eb{top:18px;left:82px}.p-se{top:38px;left:155px}
.p-ue{top:56px;left:118px}.p-un{top:80px;left:102px}.p-ch{top:102px;left:102px}
.p-cb{top:148px;left:62px}.p-ua{top:208px;left:178px}.p-th{top:-10px;left:102px}
/* Counter */
.tcr{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);text-align:center;z-index:5}
.tcr b{font-size:2.2em;font-weight:900;color:#4ecdc4;display:block}
.tcr span{font-size:.65em;color:rgba(255,255,255,.2)}
/* Progress */
.t-prog{position:absolute;bottom:50px;left:20px;right:20px;height:5px;background:rgba(255,255,255,.04);border-radius:3px;z-index:5}
.t-fill{height:100%;background:linear-gradient(90deg,#4ecdc4,#667eea);border-radius:3px;transition:width .3s}
.t-info{position:absolute;bottom:58px;left:20px;font-size:.65em;color:rgba(255,255,255,.15);z-index:5}
.t-ctrl{position:absolute;bottom:10px;display:flex;gap:10px;z-index:5}
.t-ctrl button{padding:10px 22px;border:none;border-radius:12px;font-size:.85em;font-weight:700;font-family:inherit;cursor:pointer}
.tc1{background:rgba(102,126,234,.7);color:#fff}
.tc2{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}

/* BREATHING */
#breathe{background:linear-gradient(135deg,#0c3547,#204051)}
.br-t{font-size:1.15em;font-weight:700;margin-bottom:20px;color:rgba(255,255,255,.6)}
.br-orb{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#4ecdc4 50%,#44a08d 100%);box-shadow:0 0 40px rgba(78,205,196,.25);transition:transform 3s ease-in-out,box-shadow 3s ease-in-out}
.br-orb.in{transform:scale(1.7);box-shadow:0 0 80px rgba(78,205,196,.45)}
.br-orb.out{transform:scale(1);box-shadow:0 0 25px rgba(78,205,196,.15)}
.br-lbl{font-size:1.2em;font-weight:700;margin-top:20px;color:#4ecdc4;min-height:1.5em}

/* DONE */
#done{background:linear-gradient(135deg,#4ecdc4,#44a08d)}
.dw{text-align:center;padding:24px}
.d-stars{font-size:3em;margin-bottom:12px}
.d-title{font-size:1.8em;font-weight:900;margin-bottom:4px}
.d-sub{font-size:.9em;color:rgba(255,255,255,.7);margin-bottom:8px;line-height:1.5}
.d-scores{display:flex;gap:14px;justify-content:center;margin-bottom:16px}
.d-sc{text-align:center}
.d-sc b{font-size:2em;font-weight:900;display:block}
.d-sc span{font-size:.68em;color:rgba(255,255,255,.5)}
.d-stat{font-size:.82em;color:rgba(255,255,255,.45);margin-bottom:20px}
.d-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:1em;font-weight:800;font-family:inherit;cursor:pointer}
</style>
</head>
<body>

<!-- HOME -->
<div class="scr on" id="home">
<div style="font-size:3.5em;margin-bottom:4px">👆</div>
<div class="logo">Tap Along</div>
<div class="logosub">EFT Tapping for Kids & Families<br>Guided step-by-step — just follow along</div>
<button class="mbtn m1" onclick="begin('quick')">Quick Calm<span class="msub">1-2 min · 4 key points</span></button>
<button class="mbtn m2" onclick="begin('full')">Full Round<span class="msub">3-5 min · All 9 points · Basic Recipe</span></button>
<button class="mbtn m3" onclick="begin('ext')">Deep Session<span class="msub">8-12 min · 3 full rounds</span></button>
<div style="margin-top:auto;font-size:.65em;color:rgba(255,255,255,.3);padding:8px">Quantum Neuroshift™ · v0.3</div>
</div>

<!-- GUIDE (coaching screen — content set dynamically) -->
<div class="scr" id="guide"><div class="gw" id="gw"></div></div>

<!-- SUDS -->
<div class="scr" id="suds"><div class="sw" id="sudsW"></div></div>

<!-- TAP -->
<div class="scr" id="tap">
<div class="tap-top"><div class="t-name" id="tName"></div><div class="t-inst" id="tInst"></div></div>
<div class="t-say" id="tSay"><div class="t-say-lbl">Say out loud while tapping:</div><div class="t-say-txt" id="tSayTxt"></div></div>
<div class="bw">
<svg viewBox="0 0 250 360" fill="none">
<ellipse cx="126" cy="44" rx="34" ry="40" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
<line x1="126" y1="84" x2="126" y2="112" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
<path d="M80 112L80 252Q80 268 96 268L156 268Q172 268 172 252L172 112Z" stroke="rgba(255,255,255,.05)" stroke-width="2" fill="rgba(255,255,255,.008)"/>
<path d="M80 128L36 214L26 232" stroke="rgba(255,255,255,.05)" stroke-width="2" fill="none"/>
<path d="M172 128L216 214L226 232" stroke="rgba(255,255,255,.05)" stroke-width="2" fill="none"/>
<line x1="106" y1="268" x2="96" y2="355" stroke="rgba(255,255,255,.05)" stroke-width="2"/>
<line x1="146" y1="268" x2="156" y2="355" stroke="rgba(255,255,255,.05)" stroke-width="2"/>
</svg>
<div class="tp p-kc" data-p="kc" onclick="doTap(this)">🤚</div>
<div class="tp p-th" data-p="th" onclick="doTap(this)">🧠</div>
<div class="tp p-eb" data-p="eb" onclick="doTap(this)">👁️</div>
<div class="tp p-se" data-p="se" onclick="doTap(this)">👁️</div>
<div class="tp p-ue" data-p="ue" onclick="doTap(this)">😌</div>
<div class="tp p-un" data-p="un" onclick="doTap(this)">👃</div>
<div class="tp p-ch" data-p="ch" onclick="doTap(this)">😊</div>
<div class="tp p-cb" data-p="cb" onclick="doTap(this)">💪</div>
<div class="tp p-ua" data-p="ua" onclick="doTap(this)">🤗</div>
</div>
<div class="tcr"><b id="tNum">0</b><span>taps — need 7</span></div>
<div class="t-info" id="tInfo"></div>
<div class="t-prog"><div class="t-fill" id="tFill"></div></div>
<div class="t-ctrl">
<button class="tc1" id="btnP" onclick="tPause()">⏸ Pause</button>
<button class="tc2" onclick="show('home')">✕ Stop</button>
</div>
</div>

<!-- BREATHING -->
<div class="scr" id="breathe">
<div class="br-t" id="brT">Breathing Break</div>
<div class="br-orb" id="brO"></div>
<div class="br-lbl" id="brL"></div>
</div>

<!-- DONE -->
<div class="scr" id="done">
<div class="dw">
<div class="d-stars">⭐🌟⭐</div>
<div class="d-title">Amazing Job!</div>
<div class="d-sub" id="dSub"></div>
<div class="d-scores" id="dScores"></div>
<div class="d-stat" id="dStat"></div>
<button class="d-btn" onclick="show('home')">🏠 Tap Again</button>
</div>
</div>

<script>
// ===== AUDIO =====
let AC=null;
function ia(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume()}
function sn(f,d,v,t){if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+(d||.12));o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+(d||.12))}
function tapSnd(){sn(500+Math.random()*200,.1,.1)}
function doneSnd(){[523,659,784].forEach((f,i)=>setTimeout(()=>sn(f,.3,.09),i*120))}
function stepSnd(){sn(400,.15,.06,'triangle');setTimeout(()=>sn(550,.12,.05),80)}
function clickSnd(){sn(600,.06,.05)}
function vb(m){if(navigator.vibrate)navigator.vibrate(m||20)}
document.addEventListener('touchstart',ia,{once:true});
document.addEventListener('click',ia,{once:true});

// ===== CONFIG =====
const FULL=['kc','eb','se','ue','un','ch','cb','ua','th'];
const QUICK=['kc','eb','cb','th'];
const NM={kc:'Karate Chop',eb:'Eyebrow',se:'Side of Eye',ue:'Under Eye',un:'Under Nose',ch:'Chin',cb:'Collarbone',ua:'Under Arm',th:'Top of Head'};
const WHERE={kc:'the fleshy side of your hand',eb:'the inner edge of your eyebrow',se:'the bone beside the outer corner of your eye',ue:'the bone right under your eye',un:'between your nose and upper lip',ch:'the crease below your lower lip',cb:'just below where your collarbone meets the breastbone',ua:'about 4 inches below your armpit, on the side of your body',th:'the very top of your head'};
const EM={kc:'🤚',eb:'👁️',se:'👁️',ue:'😌',un:'👃',ch:'😊',cb:'💪',ua:'🤗',th:'🧠'};
const TAPS=7;

const SETUPS_FIRST=[
  "Even though I have this big feeling,\nI'm still a good kid and I'm okay",
  "Even though I feel worried right now,\nI love and accept myself",
  "Even though my body feels tense,\nI'm safe and I'm doing my best",
  "Even though I feel upset,\nI deeply and completely accept myself",
  "Even though I'm feeling scared,\nI know I am brave and loved"
];
const SETUP_LATER="Even though I still have some\nof this feeling, I deeply and\ncompletely accept myself";
const REMINDERS=["This big feeling","This worry","Feeling tense","Feeling upset","This scared feeling"];
const POSITIVES=["I choose to feel calm","I am safe right now","My body is relaxing","I can handle this","I am brave and strong","Peace is flowing in","I'm letting go","I feel lighter already","Every tap helps","I trust my body","I am loved","This feeling is shrinking","Calm is flowing in","I'm doing great"];

// ===== STATE =====
let mode,pts,pi,tc,totalTaps,rounds,rd,paused,suds=[],sIdx;

function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));const e=document.getElementById(id);e.classList.remove('on');void e.offsetWidth;e.classList.add('on')}

// ===== BEGIN =====
function begin(m){
  ia();mode=m;rd=0;totalTaps=0;suds=[];
  sIdx=Math.floor(Math.random()*SETUPS_FIRST.length);
  if(m==='quick'){pts=[...QUICK];rounds=1}
  else if(m==='full'){pts=[...FULL];rounds=1}
  else{pts=[...FULL];rounds=3}
  // Quick: brief intro then straight to tapping
  if(m==='quick'){showQuickIntro();return}
  // Full/Ext: SUDS first
  showSuds(false);
}

// ===== QUICK INTRO =====
function showQuickIntro(){
  const g=document.getElementById('gw');
  g.innerHTML=`
    <div class="g-step">Quick Calm</div>
    <div class="g-emoji">🤚</div>
    <div class="g-title">Let's start on the<br>Karate Chop point</div>
    <div class="g-body">Hold one hand out flat.\nWith the other hand, get ready to tap the fleshy side — like a karate chop.\n\nWe'll do 4 points, 7 taps each.</div>
    <button class="mbtn m1" onclick="startRound()">I'm Ready →</button>`;
  show('guide');
}

// ===== SUDS =====
function showSuds(isPost){
  const w=document.getElementById('sudsW');
  let html=`<div style="font-size:2.5em;margin-bottom:10px">${isPost?'🔄':'🎯'}</div>`;
  html+=`<div style="font-size:1.15em;font-weight:700;margin-bottom:4px">${isPost?'How big is the feeling now?':'How big is the feeling right now?'}</div>`;
  html+=`<div style="font-size:.82em;color:rgba(255,255,255,.3);margin-bottom:18px">${isPost?'Has it changed since we started?':'Pick a number — 0 is totally calm, 10 is the biggest'}</div>`;
  html+='<div class="s-row">';
  for(let i=0;i<=10;i++) html+=`<button class="sb" onclick="pickSuds(this,${i},${isPost})">${i}</button>`;
  html+='</div><div class="s-ends"><span>😌 Calm</span><span>😰 Biggest</span></div>';
  html+=`<button class="mbtn m1" id="sudsGo" style="opacity:.3;pointer-events:none" onclick="sudsNext(${isPost})">Next →</button>`;
  w.innerHTML=html;
  show('suds');
}
let sudsPick=-1;
function pickSuds(el,n,isPost){
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');sudsPick=n;clickSnd();vb(15);
  const btn=document.getElementById('sudsGo');
  btn.style.opacity='1';btn.style.pointerEvents='auto';
}
function sudsNext(isPost){
  suds.push(sudsPick);sudsPick=-1;
  if(isPost){showSetup();return}
  // First time — explain the setup statement
  showSetupIntro();
}

// ===== SETUP INTRO (teach them what we're about to do) =====
function showSetupIntro(){
  const stmt=rd>0?SETUP_LATER:SETUPS_FIRST[sIdx];
  const g=document.getElementById('gw');
  g.innerHTML=`
    <div class="g-step">${rd>0?'Round '+(rd+1)+' Setup':'Step 1: Setup Statement'}</div>
    <div class="g-emoji">🤚</div>
    <div class="g-title">Karate Chop Point</div>
    <div class="g-body">Hold one hand out flat, palm facing you.\n\nWith your other hand, you'll tap the side — the fleshy part you'd use for a karate chop.\n\nWhile tapping, say this out loud 3 times:</div>
    <div class="g-quote">"${stmt}"</div>
    <button class="mbtn m1" onclick="showSetup()">Start Tapping →</button>`;
  show('guide');
}

// ===== SETUP (3 reps with coaching) =====
let setupRep=0;
function showSetup(){
  setupRep=0;
  renderSetupRep();
  show('guide');
}
function renderSetupRep(){
  const stmt=rd>0?SETUP_LATER:SETUPS_FIRST[sIdx];
  const labels=['First time','Second time','Third time — last one!'];
  const g=document.getElementById('gw');
  const dots=Array.from({length:3},(_,i)=>`<div class="gp${i<setupRep?' done':i===setupRep?' cur':''}"></div>`).join('');
  g.innerHTML=`
    <div class="g-step">${labels[setupRep]}</div>
    <div class="g-body" style="margin-bottom:8px">Tap your Karate Chop and say:</div>
    <div class="g-quote">"${stmt}"</div>
    <div class="g-tap-zone" onclick="doSetupTap()">🤚</div>
    <div class="g-count">${setupRep} / 3</div>
    <div class="g-prog">${dots}</div>
    <div class="g-hint">Tap the hand above each time you say it</div>`;
}
function doSetupTap(){
  setupRep++;tapSnd();vb(35);
  if(setupRep>=3){
    // Show "Great!" then transition to first point
    const g=document.getElementById('gw');
    g.innerHTML=`
      <div class="g-emoji">✅</div>
      <div class="g-title">Setup complete!</div>
      <div class="g-body">Great job. Now we'll tap through ${pts.length===9?'all 9':'the key'} points on your body.\n\nI'll show you each one.</div>
      <button class="mbtn m1" onclick="showPointIntro()">Let's Go →</button>`;
    stepSnd();
    return;
  }
  renderSetupRep();
}

// ===== POINT INTRO (before each new point) =====
function showPointIntro(){
  const p=pts[pi];
  const g=document.getElementById('gw');
  const isFirst=pi===0;
  g.innerHTML=`
    <div class="g-step">Point ${pi+1} of ${pts.length}${rounds>1?' · Round '+(rd+1):''}</div>
    <div class="g-emoji">${EM[p]}</div>
    <div class="g-title">${NM[p]}</div>
    <div class="g-body">${isFirst?'Find':'Now move to'} ${WHERE[p]}.\n\nUse two fingertips and tap gently — firm enough to feel it, light enough to be comfortable.\n\n7 taps while saying the reminder phrase.</div>
    <button class="mbtn m1" onclick="startRound()">Tap Here →</button>`;
  show('guide');stepSnd();
}

// ===== TAPPING =====
function startRound(){
  tc=0;paused=false;
  document.getElementById('btnP').textContent='⏸ Pause';
  activatePoint();
  show('tap');
}

function activatePoint(){
  tc=0;
  document.getElementById('tNum').textContent='0';
  document.querySelectorAll('.tp').forEach(el=>{
    el.classList.remove('act','done','dim','next-up');
    const p=el.dataset.p;
    if(mode==='quick'&&!QUICK.includes(p)){el.classList.add('dim');return}
    const idx=pts.indexOf(p);
    if(idx<pi)el.classList.add('done');
    else if(idx===pi)el.classList.add('act');
    else if(idx===pi+1)el.classList.add('next-up');
  });
  const cp=pts[pi];
  document.getElementById('tName').textContent=NM[cp];
  document.getElementById('tInst').textContent='Tap '+WHERE[cp];
  // Say phrase
  if(rd===0){
    document.getElementById('tSayTxt').textContent='"'+REMINDERS[sIdx%REMINDERS.length]+'"';
  }else{
    document.getElementById('tSayTxt').textContent='"'+POSITIVES[Math.floor(Math.random()*POSITIVES.length)]+'"';
  }
  const total=pts.length*rounds;
  const done2=rd*pts.length+pi;
  document.getElementById('tInfo').textContent=`Point ${done2+1} of ${total}${rounds>1?' · Round '+(rd+1)+'/'+rounds:''}`;
  document.getElementById('tFill').style.width=(done2/total*100)+'%';
}

function doTap(el){
  if(paused)return;
  if(el.dataset.p!==pts[pi])return;
  tc++;totalTaps++;
  document.getElementById('tNum').textContent=tc;
  tapSnd();vb(25);
  el.style.transform='scale(1.2)';setTimeout(()=>el.style.transform='',120);
  if(tc>=TAPS){
    el.classList.remove('act');el.classList.add('done');
    pi++;
    if(pi>=pts.length){
      rd++;
      if(rd<rounds){
        breathBreak(()=>showSuds(true));
      }else{
        breathBreak(()=>finishSession());
      }
    }else{
      // Show next point intro (guided) — breathing break every 3 points
      if(pi%3===0&&mode!=='quick'){
        breathBreak(()=>showPointIntro());
      }else{
        showPointIntro();
      }
    }
  }
}

function tPause(){
  paused=!paused;
  document.getElementById('btnP').textContent=paused?'▶ Resume':'⏸ Pause';
}

// ===== BREATHING =====
function breathBreak(cb){
  show('breathe');
  const orb=document.getElementById('brO'),lbl=document.getElementById('brL');
  let s=0;
  const cyc=()=>{
    if(s===0){orb.className='br-orb in';lbl.textContent='Breathe in...'}
    else if(s===1){lbl.textContent='Hold...'}
    else if(s===2){orb.className='br-orb out';lbl.textContent='Breathe out...'}
    else if(s===3){lbl.textContent='Nice...'}
    s++;
    if(s<=4)setTimeout(cyc,1800);
    else cb();
  };cyc();
}

// ===== FINISH =====
function finishSession(){
  if(mode!=='quick'&&suds.length>0){
    const before=suds[0],after=suds[suds.length-1],diff=before-after;
    let msg='';
    if(diff>=3)msg='Huge drop! The tapping really worked 💚';
    else if(diff>=1)msg='Nice improvement — keep practicing 👍';
    else if(diff===0)msg='Same level — try another round or a different phrase';
    else msg="That's okay — sometimes feelings shift slowly";
    document.getElementById('dSub').textContent=msg;
    let sc='<div class="d-sc"><b style="color:#e74c3c">'+before+'</b><span>Before</span></div>';
    sc+='<div class="d-sc"><b style="font-size:1.2em;color:rgba(255,255,255,.25)">→</b><span></span></div>';
    sc+='<div class="d-sc"><b style="color:#2ecc71">'+after+'</b><span>After</span></div>';
    if(suds.length>2)sc+='<div class="d-sc" style="margin-left:12px"><span style="font-size:.72em;color:rgba(255,255,255,.3)">Journey: '+suds.join(' → ')+'</span></div>';
    document.getElementById('dScores').innerHTML=sc;
  }else{
    document.getElementById('dSub').textContent='Quick calm complete — you did great!';
    document.getElementById('dScores').innerHTML='';
  }
  const mn={quick:'Quick Calm',full:'Full Round',ext:'Deep Session'};
  document.getElementById('dStat').textContent=`${mn[mode]} · ${totalTaps} taps · ${pts.length*rounds} points · ${rounds} round${rounds>1?'s':''}`;
  doneSnd();vb([80,30,80,30,150]);
  show('done');
}
</script>
